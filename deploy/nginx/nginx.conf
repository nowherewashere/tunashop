# Front nginx for the tunashop origin (runs as a container on the remnawave network).
# Deployed at /opt/remnawave/nginx/nginx.conf — keep this copy in step with the server.
#
# Pairs with src/core/utils/net.py: the app recovers the client IP from X-Forwarded-For,
# which only means anything if this file controls that header. See SECURITY-EDGE.md.

limit_req_zone  $binary_remote_addr zone=tuna_api:10m   rate=30r/s;
limit_req_zone  $binary_remote_addr zone=tuna_auth:10m  rate=30r/m;
limit_req_zone  $binary_remote_addr zone=tuna_site:10m  rate=50r/s;
limit_conn_zone $binary_remote_addr zone=tuna_conn:10m;

# Limits are deliberately loose: RU mobile carriers put many real users behind one
# CGNAT address, and a false positive here is a broken page. The app's own per-IP and
# global caps are the tighter gate; this layer only blunts volume.
limit_req_status  429;
limit_conn_status 429;

client_header_timeout 10s;
client_body_timeout   15s;
send_timeout          30s;
keepalive_timeout     30s;

server {
    server_name tunashop.tuna-transfer.xyz;

    listen 443 ssl;
    listen [::]:443 ssl reuseport;
    http2 on;

    ssl_protocols          TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305;
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_tickets    off;
    ssl_certificate "/etc/nginx/ssl/fullchain.pem";
    ssl_certificate_key "/etc/nginx/ssl/privkey.key";
    ssl_trusted_certificate "/etc/nginx/ssl/fullchain.pem";
    ssl_stapling           on;
    ssl_stapling_verify    on;
    resolver               127.0.0.11 valid=10s;
    resolver_timeout       2s;

    limit_conn tuna_conn 100;

    # Inherited by every location below — nginx only inherits proxy_set_header when a
    # location defines none of its own, so no location here may add one.
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Port  $server_port;
    # Overwrite, never append: whatever the client sent is discarded, so exactly one
    # hop — the address nginx actually saw — reaches the app.
    proxy_set_header X-Forwarded-For   $remote_addr;
    # Nothing sits in front to strip this; without the reset a client sets it freely
    # and forges its own address.
    proxy_set_header CF-Connecting-IP  "";

    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Telegram webhook. Deliberately NOT pinned to Telegram's published ranges: if
    # delivery ever came from outside them the bot would go silent with no warning,
    # and a dead bot costs more than the traffic an allowlist would save. The app
    # verifies the secret token in constant time and bounds its own update backlog.
    # The limit is generous — Telegram redelivers a backlog in bursts, and a 429 only
    # makes it retry.
    location = /api/v1/telegram {
        limit_req zone=tuna_api burst=60 nodelay;
        set $app remnashop;
        proxy_pass http://$app:5000;
    }

    # Payment callbacks. NOT allowlisted: Platega publishes no source ranges, so a
    # blanket allow/deny here would silently kill real payments. Signature checks in
    # each gateway remain the real gate; the limit is generous on purpose.
    location ^~ /api/v1/payments/ {
        limit_req zone=tuna_api burst=60 nodelay;
        set $app remnashop;
        proxy_pass http://$app:5000;
    }

    # Remnawave panel webhook. Not pinned to the panel VPS address either: the
    # signature is HMAC-verified over the raw body before parsing, and pinning adds a
    # failure mode where a panel migration silently stops subscription events.
    location = /api/v1/remnawave {
        limit_req zone=tuna_api burst=60 nodelay;
        set $app remnashop;
        proxy_pass http://$app:5000;
    }

    # Only the endpoints that send mail, create accounts or accept credentials.
    # Deliberately NOT the whole /auth/ prefix: /me and /refresh are called on every
    # SPA navigation, and a tight limit on those would 429 real users behind CGNAT.
    location ~ ^/api/v1/public/auth/(register|login|email/request-code|email/verify-code|email/request-verification)$ {
        limit_req zone=tuna_auth burst=10 nodelay;
        set $app remnashop;
        proxy_pass http://$app:5000;
    }

    location /api/v1 {
        limit_req zone=tuna_api burst=60 nodelay;
        set $app remnashop;
        proxy_pass http://$app:5000;
    }

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    ssl_reject_handshake on;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.v-tuna.com;

    ssl_certificate     /etc/nginx/ssl/v-tuna.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/v-tuna.com/privkey.key;

    return 301 https://v-tuna.com$request_uri;
}

server {
    server_name v-tuna.com;
    listen 443 ssl;
    http2 on;
    ssl_certificate     /etc/nginx/ssl/v-tuna.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/v-tuna.com/privkey.key;

    resolver 127.0.0.11 valid=30s;

    limit_conn tuna_conn 100;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For   $remote_addr;
    proxy_set_header CF-Connecting-IP  "";

    # Exact match, so it wins over the regex locations regardless of order.
    location = /api/v1/public/support/stream {
        set $app remnashop;
        proxy_pass http://$app:5000;

        # Repeated in full: adding one proxy_set_header here would drop every
        # inherited header, including the two that make client IPs trustworthy.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header CF-Connecting-IP  "";
        proxy_set_header Connection        "";

        proxy_buffering    off;
        proxy_cache        off;
        gzip               off;
        chunked_transfer_encoding on;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        # Overrides the global 30s: writes to the client are only as frequent as the
        # ~20s heartbeat, and a lagging one must not tear the stream down.
        send_timeout        3600s;
    }

    # Must precede the (public|connect) regex — first matching regex wins. Scoped to
    # the expensive endpoints only; /me and /refresh must fall through to tuna_api,
    # since the SPA calls them on every navigation.
    location ~ ^/api/v1/public/auth/(register|login|email/request-code|email/verify-code|email/request-verification)$ {
        limit_req zone=tuna_auth burst=10 nodelay;
        set $app remnashop;
        proxy_pass http://$app:5000;
    }

    location ~ ^/api/v1/(public|connect)/ {
        limit_req zone=tuna_api burst=60 nodelay;
        set $app remnashop;
        proxy_pass http://$app:5000;
    }

    location / {
        limit_req zone=tuna_site burst=100 nodelay;
        set $tuna_site tuna-site;
        proxy_pass http://$tuna_site:80;
    }

    # CWV-05 — compress text assets at the origin (no Cloudflare Brotli any more).
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_types        text/plain text/css text/xml
                      application/javascript application/json application/xml
                      application/rss+xml image/svg+xml application/manifest+json;

    # SEO-09 — security headers (origin-owned under grey).
    add_header Strict-Transport-Security "max-age=15552000"                 always;
    add_header X-Content-Type-Options    "nosniff"                          always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"  always;
}
